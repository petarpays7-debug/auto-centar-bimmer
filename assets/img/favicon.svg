<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Auto Centar Bimmer">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0d0f12"/>
  <!-- AC letters -->
  <text x="32" y="30" font-family="system-ui, -apple-system, sans-serif" font-weight="800"
        font-size="19" fill="#f5f7fa" text-anchor="middle" letter-spacing="-0.5">AC</text>
  <!-- BIMMER smaller below -->
  <text x="32" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="700"
        font-size="9" fill="#2f93e0" text-anchor="middle" letter-spacing="1.5">BIMMER</text>
  <!-- M-stripe bottom accent -->
  <rect x="10" y="52" width="14" height="3" rx="1.5" fill="#2f93e0"/>
  <rect x="25" y="52" width="14" height="3" rx="1.5" fill="#16498c"/>
  <rect x="40" y="52" width="14" height="3" rx="1.5" fill="#d6203a"/>
</svg>
